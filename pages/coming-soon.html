<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | RecruitPro</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <script src="../assets/js/main.js" defer></script>

    <style>
        .countdown-grid {
            display: flex;
            gap: var(--s5);
            justify-content: center;
            margin-bottom: var(--s7);
        }
        .countdown-item {
            text-align: center;
        }
        .countdown-value {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: var(--r-xl);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: var(--s2);
        }
        .countdown-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        @media (max-width: 480px) {
            .countdown-value { width: 64px; height: 64px; font-size: 1.5rem; }
        }
    </style>

    <script>document.documentElement.dir = localStorage.getItem('dir') || 'ltr';</script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Recruit<span>Pro</span>.</a>
        </div>
    </header>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: var(--s5); background: linear-gradient(135deg, #0F2318 0%, #162E22 50%, #1A3D2B 100%); position: relative; overflow: hidden;">
        <!-- Decorative -->
        <div style="position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); top: -200px; right: -100px; animation: float 6s ease-in-out infinite;"></div>
        <div style="position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(201,169,110,0.15) 0%, transparent 70%); bottom: -100px; left: -50px; animation: float 8s ease-in-out infinite reverse;"></div>

        <div style="position: relative; z-index: 1; max-width: 600px;">
            <span class="section-subtitle" style="color: white; background: rgba(255,255,255,0.1);"><svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; display: inline-block;"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg> Launching Soon</span>
            <h1 style="color: white; font-size: clamp(2.5rem, 6vw, 3.5rem); margin-top: var(--s4);">Something Amazing <br>Is <span class="text-gradient">Coming</span></h1>
            <p style="color: rgba(255,255,255,0.7); font-size: 1.125rem; margin-bottom: var(--s7);">We're crafting a new experience that will transform the way you hire and get hired. Be the first to know when we launch.</p>

            <div class="countdown-grid" id="countdown">
                <div class="countdown-item">
                    <div class="countdown-value" id="days">00</div>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="hours">00</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="minutes">00</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="seconds">00</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>

            <form class="needs-validation" novalidate style="max-width: 440px; margin: 0 auto; display: flex; gap: var(--s2);">
                <input type="email" class="form-control" required placeholder="Enter your email address" style="flex: 1; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: white;">
                <button type="submit" class="btn btn-primary">Notify Me</button>
            </form>
            <p style="color: rgba(255,255,255,0.4); font-size: 0.8125rem; margin-top: var(--s3);">No spam. Unsubscribe anytime.</p>
        </div>
    </main>

    <script>
        // Countdown Timer — set to 30 days from now
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30);

        function updateCountdown() {
            const now = new Date();
            const diff = launchDate - now;

            const days = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
            const hours = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            const minutes = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
            const seconds = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
